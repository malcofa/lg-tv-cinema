name: Build webOS IPK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install webOS CLI
        run: npm install -g @webosose/ares-cli

      - name: Validate appinfo.json
        run: |
          node -e "const a=require('./app/appinfo.json'); if(!a.id||!a.version) throw 'appinfo.json inválido'; console.log('OK', a.id, a.version)"

      - name: Package IPK
        run: |
          mkdir -p dist
          ares-package ./app -o dist --no-minify
          ls -la dist

      - name: Get version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./app/appinfo.json').version)")
          APPID=$(node -e "console.log(require('./app/appinfo.json').id)")
          IPK="${APPID}_${VERSION}_all.ipk"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "ipk_name=${IPK}" >> $GITHUB_OUTPUT
          echo "Built: ${IPK}"

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cinema-ipk-${{ steps.version.outputs.version }}
          path: dist/*.ipk
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ipk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
